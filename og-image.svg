<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFBF3"/><stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FCC419"/><stop offset="1" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="12" fill="url(#amber)"/>

  <!-- logo -->
  <g transform="translate(90,86)">
    <line x1="50" y1="49" x2="74" y2="73" stroke="#D97706" stroke-width="11" stroke-linecap="round"/>
    <circle cx="35" cy="35" r="26" fill="url(#amber)"/>
    <path d="M23 37 35 26 47 37" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M27 35v13h16V35" fill="none" stroke="#fff" stroke-width="5" stroke-linejoin="round"/>
    <text x="98" y="50" font-size="46" font-weight="800" fill="#D97706" letter-spacing="-1">HelpMeFind</text>
  </g>

  <!-- headline -->
  <text x="90" y="300" font-size="82" font-weight="800" fill="#1f2426" letter-spacing="-2">Find your place near EHL.</text>
  <text x="92" y="372" font-size="36" font-weight="500" fill="#454b4d">Rooms, studios &amp; flats to <tspan fill="#B45309" font-weight="700">rent</tspan>, <tspan fill="#B45309" font-weight="700">sublease</tspan> or <tspan fill="#B45309" font-weight="700">share</tspan>.</text>

  <!-- trust pills -->
  <g font-size="28" font-weight="700">
    <g transform="translate(90,440)">
      <rect width="318" height="64" rx="32" fill="#fff" stroke="#ededed"/>
      <text x="34" y="42" fill="#1f2426">✓ EHL-verified</text>
    </g>
    <g transform="translate(430,440)">
      <rect width="330" height="64" rx="32" fill="#fff" stroke="#ededed"/>
      <text x="34" y="42" fill="#1f2426">✓ No booking fees</text>
    </g>
    <g transform="translate(782,440)">
      <rect width="328" height="64" rx="32" fill="#fff" stroke="#ededed"/>
      <text x="34" y="42" fill="#1f2426">✓ By students</text>
    </g>
  </g>

  <text x="90" y="572" font-size="24" font-weight="600" fill="#6f7679">helpmefind · student housing for the EHL community · Lausanne</text>
</svg>
